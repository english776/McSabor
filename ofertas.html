<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McSabor - Ofertas Flash</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { yellow: '#FFBC0D', red: '#DA291C' } } } } }
    </script>
    <style>
        :root { --bg-color: #F8F9FA; --text-color: #111827; }
        .dark { --bg-color: #111827; --text-color: #F8F9FA; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: all 0.4s ease; }
        .card { background-color: #FFF; border: 1px solid rgba(0,0,0,0.05); }
        .dark .card { background-color: #1F2937; border: 1px solid rgba(255,255,255,0.05); }

        #mobile-menu {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0; pointer-events: none; visibility: hidden; transform: translateY(-10px);
        }
        #mobile-menu.active {
            opacity: 1; pointer-events: auto; visibility: visible; transform: translateY(0);
        }
        .hamburger-line { transition: all 0.3s ease; }
        .burger-active .line-1 { transform: translateY(7px) rotate(45deg); }
        .burger-active .line-2 { opacity: 0; }
        .burger-active .line-3 { transform: translateY(-7px) rotate(-45deg); }

        .toast-enter { animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .toast-leave { animation: slideDown 0.5s ease-in forwards; }
        @keyframes slideUp { from { transform: translateY(150%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(0); opacity: 1; } to { transform: translateY(150%); opacity: 0; } }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <!-- Navbar Corregida -->
    <header class="fixed top-0 left-0 right-0 z-[150] px-4 pt-4 pointer-events-none">
        <nav class="max-w-7xl mx-auto bg-white/80 dark:bg-gray-900/90 backdrop-blur-2xl border border-white/20 dark:border-gray-800 rounded-[24px] px-6 h-16 flex justify-between items-center shadow-2xl pointer-events-auto transition-all">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-2 group relative z-[210]">
                <img src="img/logotipo.svg" alt="McSabor Logo" class="h-10 md:h-12 w-auto group-hover:scale-105 transition-transform drop-shadow-sm dark:brightness-110">
            </a>
            <div class="hidden md:flex items-center gap-8 font-bold text-gray-600 dark:text-gray-300">
                <a href="index.html" class="hover:text-brand-red">Home</a>
                <a href="ofertas.html" class="text-brand-red">Ofertas</a>
                <a href="nosotros.html" class="hover:text-brand-red">Nosotros</a>
                <a href="contacto.html" class="hover:text-brand-red">Contacto</a>
            </div>
            <div class="flex items-center gap-3 relative z-[210]">
                <button id="dark-mode-toggle" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700">
                    <svg id="sun-icon" class="w-5 h-5 hidden text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                    <svg id="moon-icon" class="w-5 h-5 text-gray-600" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </button>
                <button id="menu-btn" class="md:hidden p-2.5 flex flex-col gap-1.5 h-10 w-10 items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 border border-gray-100 dark:border-gray-700">
                    <span class="hamburger-line line-1 w-5 h-0.5 bg-gray-900 dark:bg-white rounded-full"></span>
                    <span class="hamburger-line line-2 w-5 h-0.5 bg-gray-900 dark:bg-white rounded-full"></span>
                    <span class="hamburger-line line-3 w-5 h-0.5 bg-gray-900 dark:bg-white rounded-full"></span>
                </button>
            </div>
        </nav>
    </header>

    <!-- Overlay Menu Móvil Corregido -->
    <div id="mobile-menu" class="fixed inset-0 z-[140] bg-white dark:bg-gray-900 backdrop-blur-3xl flex flex-col pt-32 px-10 md:hidden">
        <div class="flex flex-col gap-6">
            <a href="index.html" class="text-5xl font-black text-gray-900 dark:text-white">Home</a>
            <a href="ofertas.html" class="text-5xl font-black text-brand-red">Ofertas</a>
            <a href="nosotros.html" class="text-5xl font-black text-gray-900 dark:text-white">Nosotros</a>
            <a href="contacto.html" class="text-5xl font-black text-gray-900 dark:text-white">Contacto</a>
        </div>
    </div>

    <!-- Contenido Ofertas -->
    <main class="max-w-6xl mx-auto px-4 py-32 space-y-16">        <!-- Oferta Principal con Branding -->
        <section class="card rounded-[40px] p-8 lg:p-12 flex flex-col lg:flex-row items-center gap-10 shadow-sm relative overflow-hidden transition-all dark:bg-gray-800/50">
            <div class="flex-1 space-y-6 relative z-10 w-full text-center lg:text-left">
                <div class="inline-flex items-center gap-2 bg-red-50 dark:bg-red-500/10 text-brand-red px-4 py-1.5 rounded-full font-bold text-sm">
                    <span class="w-2.5 h-2.5 rounded-full bg-brand-red animate-pulse"></span> Oferta Oficial
                </div>
                <!-- Mini Logo Branding -->
                <div class="flex justify-center lg:justify-start mb-4">
                    <img src="img/logotipo.svg" class="h-8 md:h-10 w-auto brightness-110" alt="Brand Logo">
                </div>
                <h1 class="text-5xl lg:text-7xl font-black leading-none tracking-tight dark:text-white">2x1 en McMenú</h1>
                <div class="bg-gray-50 dark:bg-gray-900 border dark:border-gray-800 p-5 rounded-[16px] flex items-center justify-between max-w-md mx-auto lg:mx-0">
                    <div>
                        <p class="text-xs text-gray-400 font-bold tracking-wider mb-1">FINALIZA EN:</p>
                        <div id="countdown" class="text-3xl font-black tabular-nums dark:text-white">04:59:59</div>
                    </div>
                    <div class="text-right border-l dark:border-gray-800 pl-6">
                        <p class="text-sm font-bold text-gray-400 line-through">16,90€</p>
                        <p class="text-3xl font-black text-brand-red">8,45€</p>
                    </div>
                </div>
                <button class="bg-brand-yellow w-full sm:w-max font-black text-xl px-10 py-5 rounded-full shadow-xl hover:scale-105 transition-all text-gray-900">¡Conseguir Ya!</button>
            </div>
            <div class="flex-1 w-full relative group">
                <img src="img/hero_burger.png" class="w-full rounded-[32px] shadow-2xl border-4 border-white dark:border-gray-700">
                <!-- Watermark en Hero -->
                <div class="absolute bottom-6 right-6 bg-white/90 dark:bg-gray-900/90 backdrop-blur-xl p-3 rounded-2xl shadow-2xl border border-white/20 transform group-hover:scale-110 transition-transform">
                    <img src="img/logotipo.svg" class="h-8 w-auto" alt="Verified">
                </div>
            </div>
        </section>

        <!-- Cuadrícula de Ofertas con Watermarks -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Nuggets -->
            <article class="card rounded-[32px] overflow-hidden flex flex-col group p-2">
                <div class="relative">
                    <img src="img/nuggets.png" class="w-full h-56 object-cover rounded-[24px]">
                    <!-- Watermark Logo -->
                    <div class="absolute top-4 left-4 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md p-2 rounded-xl shadow-lg border border-white/20 opacity-0 group-hover:opacity-100 transition-opacity">
                        <img src="img/logotipo.svg" class="h-6 w-auto" alt="Logo">
                    </div>
                </div>
                <div class="p-4 pt-6">
                    <h3 class="text-2xl font-black dark:text-white mb-2 uppercase tracking-tighter">20 Nuggets</h3>
                    <div class="flex justify-between items-end border-t dark:border-gray-800 pt-4 mt-2">
                        <div><span class="text-gray-400 line-through">11,50€</span><p class="text-3xl font-black dark:text-white">7,50€</p></div>
                        <button class="bg-gray-900 dark:bg-white dark:text-gray-900 text-white font-bold px-6 py-2 rounded-full">¡Dámelas!</button>
                    </div>
                </div>
            </article>

            <!-- McFlurry -->
            <article class="card rounded-[32px] overflow-hidden flex flex-col group p-2">
                <div class="relative">
                    <img src="img/mcflurry.png" class="w-full h-56 object-cover rounded-[24px]">
                    <!-- Watermark Logo -->
                    <div class="absolute top-4 left-4 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md p-2 rounded-xl shadow-lg border border-white/20 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                        <img src="img/logotipo.svg" class="h-6 w-auto" alt="Logo">
                    </div>
                </div>
                <div class="p-4 pt-6">
                    <h3 class="text-2xl font-black dark:text-white mb-2 uppercase tracking-tighter">McFlurry 1€</h3>
                    <div class="flex justify-between items-end border-t dark:border-gray-800 pt-4 mt-2">
                        <div><span class="text-gray-400 line-through">3,50€</span><p class="text-3xl font-black text-brand-red">1,00€</p></div>
                        <button class="bg-brand-red text-white font-bold px-6 py-2 rounded-full shadow-lg">¡Hoy sí!</button>
                    </div>
                </div>
            </article>

            <!-- Patatas -->
            <article class="card rounded-[32px] overflow-hidden flex flex-col group p-2">
                <div class="relative">
                    <img src="img/fries.png" class="w-full h-56 object-cover rounded-[24px]">
                    <!-- Watermark Logo -->
                    <div class="absolute top-4 left-4 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md p-2 rounded-xl shadow-lg border border-white/20 opacity-0 group-hover:opacity-100 transition-opacity">
                        <img src="img/logotipo.svg" class="h-6 w-auto" alt="Logo">
                    </div>
                </div>
                <div class="p-4 pt-6">
                    <h3 class="text-2xl font-black dark:text-white mb-2 uppercase tracking-tighter">Extra Fries</h3>
                    <div class="flex justify-between items-end border-t dark:border-gray-800 pt-4 mt-2">
                        <div><span class="text-gray-400 line-through">3,20€</span><p class="text-2xl font-black dark:text-white">1,50€</p></div>
                        <button class="bg-gray-900 dark:bg-white dark:text-gray-900 text-white font-bold px-6 py-2 rounded-full">Añadir</button>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <div id="toast-container" class="fixed bottom-6 left-6 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        const html = document.documentElement;
        
        // --- MODO OSCURO (CORREGIDO) ---
        const toggleBtn = document.getElementById('dark-mode-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        function setTheme(isDark) {
            html.classList.toggle('dark', isDark);
            sunIcon.classList.toggle('hidden', !isDark);
            moonIcon.classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            setTheme(true);
        }
        toggleBtn.addEventListener('click', () => setTheme(!html.classList.contains('dark')));

        // --- MENU MOVIL (CORREGIDO) ---
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => {
            const isActive = mobileMenu.classList.toggle('active');
            menuBtn.classList.toggle('burger-active', isActive);
            document.body.style.overflow = isActive ? 'hidden' : '';
        });

        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
                menuBtn.classList.remove('burger-active');
                document.body.style.overflow = '';
            });
        });

        // --- LOGICA OFERTAS ---
        let timeRemaining = (4 * 3600) + (59 * 60) + 59;
        setInterval(() => {
            const h = Math.floor(timeRemaining / 3600), m = Math.floor((timeRemaining % 3600) / 60), s = timeRemaining % 60;
            document.getElementById('countdown').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(timeRemaining > 0) timeRemaining--;
        }, 1000);

        setInterval(() => {
            const toast = document.createElement('div');
            toast.className = "bg-gray-900 dark:bg-white dark:text-gray-900 text-white p-4 rounded-2xl shadow-2xl toast-enter flex items-center gap-3 border dark:border-gray-800";
            toast.innerHTML = `<span class='text-xl'>🍔</span> <p class='font-bold text-sm'>Alguien acaba de canjear un cupón</p>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => { toast.classList.add('toast-leave'); toast.addEventListener('animationend', () => toast.remove()); }, 4500);
        }, 12000);
    </script>
</body>
</html>
